# SPDX-License-Identifier: FSL-1.1-MIT

name: CI

on:
  push:
    # Only build on pushes to main. PRs are validated via the `pull_request`
    # event below, so leaving `push:` unscoped made every PR commit run the
    # whole pipeline twice. `main` pushes still run docker-publish-staging +
    # autodeploy; releases use the `release` event.
    branches:
      - main
  pull_request:
  release:
    types: [released]

# Cancel superseded runs for the same ref (e.g. rapid PR pushes) so stale
# builds stop hogging runners. `main` is exempt so an in-flight staging deploy
# is never cancelled by a follow-up merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  DOCKER_IMAGE_REGISTRY: safeglobal
  DOCKER_IMAGE_NAME: safe-client-gateway-nest
  DOCKER_BUILD_IMAGE_TAG: buildcache

jobs:
  license-headers:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14.3'
      - run: pip install pre-commit

      - name: Run pre-commit on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi

          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            echo "No valid base ref; skipping."
            exit 0
          fi

          if ! git cat-file -e "$BASE_REF^{commit}" 2>/dev/null; then
            echo "$BASE_REF is not available locally; falling back to HEAD^."
            BASE_REF="HEAD^"
          fi

          CHANGED_FILES=$(git diff --name-only --diff-filter=AM "$BASE_REF" HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No added or modified files; skipping."
            exit 0
          fi

          pre-commit run --files $CHANGED_FILES

  env-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.11.0' # Krypton
          cache: 'yarn'
      # Install unconditionally rather than caching the linked node_modules:
      # `enableHardenedMode` (.yarnrc.yml) verifies the supply chain only during
      # `yarn install`, so skipping install on a warm cache would bypass that
      # check. The `cache: 'yarn'` download cache above keeps this fast — tarballs
      # are already fetched, so install only re-links and re-verifies.
      - run: yarn install --immutable
      - run: yarn run env:validate:silent

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.11.0' # Krypton
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn run format-check
      - run: yarn run lint-check
      # `nest build` (a full tsc compile) was dropped from the test jobs, which
      # removed whole-program type-checking on PRs — ts-jest only type-checks
      # files a test imports. Run an explicit no-emit type-check here so type
      # errors fail the PR instead of only surfacing on the main-only Docker
      # build. Needs the generated ABIs that the `@/abis` alias resolves to.
      - run: yarn generate-abis
      - run: yarn tsc --noEmit -p tsconfig.build.json

  unit-tests:
    runs-on: ubuntu-latest
    env:
      POSTGRES_TEST_DB: test-db
      POSTGRES_TEST_USER: postgres
      POSTGRES_TEST_PASSWORD: postgres
      POSTGRES_TEST_PORT: 5433
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:14.8
        env:
          POSTGRES_DB: test-db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      rabbitmq:
        image: rabbitmq:alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmqctl await_startup"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.11.0' # Krypton
          cache: 'yarn'
      - run: yarn install --immutable
      # Tests are transformed straight from `src` by the test runner, so the
      # full `nest build` (compile to dist) isn't needed here — only the
      # generated ABIs that the `@/abis` import alias resolves to.
      - run: yarn generate-abis
      - run: yarn run test:unit:cov
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SAFE_CONFIG_BASE_URI: ${{ secrets.SAFE_CONFIG_BASE_URI }}
          LOG_SILENT: true
      - name: Coveralls Parallel
        continue-on-error: true
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: run-unit-tests
          parallel: true

  integration-tests:
    runs-on: ubuntu-latest
    env:
      POSTGRES_TEST_DB: test-db
      POSTGRES_TEST_USER: postgres
      POSTGRES_TEST_PASSWORD: postgres
      POSTGRES_TEST_PORT: 5433
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:14.8
        env:
          # Should match the env above. "Variables in the env map cannot be defined in terms of other variables in the map."
          # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#env
          POSTGRES_DB: test-db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      rabbitmq:
        image: rabbitmq:alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmqctl await_startup"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.11.0' # Krypton
          cache: 'yarn'
      - run: yarn install --immutable
      # Unlike unit-tests, the integration suite runs DB migrations, and the
      # TypeORM datasource loads them from the compiled `dist/migrations/*.js`
      # glob (see postgres.config.ts). A full `nest build` (which `yarn build`
      # wraps, ABIs included) is therefore required — `generate-abis` alone
      # leaves `dist/migrations` empty, so no migrations run and the schema is
      # never created.
      - run: yarn run build
      - run: yarn run test:integration:cov
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SAFE_CONFIG_BASE_URI: ${{ secrets.SAFE_CONFIG_BASE_URI }}
          LOG_SILENT: true
      - name: Coveralls Parallel
        continue-on-error: true
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: run-integration-tests
          parallel: true

  tests:
    name: tests (test:cov)
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Tests completed
        run: echo "All tests passed"

  tests-finish:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          fail-on-error: false

  # Production runs on arm64 only, so we build a single-arch image. We run on an
  # arm64 runner so the build is native — no QEMU emulation needed.
  docker-publish-staging:
    # `on.push.branches` already scopes push events to main, so the ref check is
    # redundant today — but it keeps this job self-guarding (it deploys to
    # staging) if the push trigger is ever broadened.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [biome, tests-finish]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: |
          BUILD_NUMBER=${{ github.sha }}
          echo "BUILD_NUMBER=${BUILD_NUMBER::7}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          platforms: linux/arm64
          push: true
          build-args: |
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
            VERSION=${{ github.ref_name }}
          tags: ${{ env.DOCKER_IMAGE_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:staging
          # Use Registry cache backend https://docs.docker.com/build/cache/backends/registry/
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_BUILD_IMAGE_TAG }}
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_BUILD_IMAGE_TAG }},mode=max

  docker-publish-release:
    if: (github.event_name == 'release' && github.event.action == 'released')
    needs: [biome, tests-finish]
    runs-on: ubuntu-24.04-arm
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: |
          BUILD_NUMBER=${{ github.sha }}
          echo "BUILD_NUMBER=${BUILD_NUMBER::7}" >> "$GITHUB_ENV"
      - name: Validate release tag
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag is empty; refusing to publish an untagged release image."
            exit 1
          fi
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          platforms: linux/arm64
          push: true
          build-args: |
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
            VERSION=${{ env.RELEASE_TAG }}
          tags: |
            ${{ env.DOCKER_IMAGE_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.RELEASE_TAG }}
            ${{ env.DOCKER_IMAGE_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          # Use Registry cache backend https://docs.docker.com/build/cache/backends/registry/
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_BUILD_IMAGE_TAG }}
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_BUILD_IMAGE_TAG }},mode=max

  autodeploy:
    runs-on: ubuntu-latest
    needs: [docker-publish-staging]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Deploy Staging
        run: bash scripts/autodeploy.sh
        env:
          AUTODEPLOY_URL: ${{ secrets.AUTODEPLOY_URL }}
          AUTODEPLOY_TOKEN: ${{ secrets.AUTODEPLOY_TOKEN }}
          TARGET_ENV: 'staging'
