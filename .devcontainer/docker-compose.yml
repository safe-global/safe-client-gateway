      - SAFE_CONFIG_BASE_URI
      - SAFE_DATA_DECODER_BASE_URI
      - STAKING_API_KEY
      - STAKING_TESTNET_API_KEY
      - TX_SERVICE_API_KEY
    # Keep the container alive for VS Code to attach to.
    command: sleep infinity
    working_dir: /workspaces/safe-client-gateway
    depends_on:
      - db
      - db-test
      - redis
      - rabbitmq
